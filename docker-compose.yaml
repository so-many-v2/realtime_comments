services:
  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_NAME}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  post_service:
    build:
      context: .
      dockerfile: builds/post_service/Dockerfile
    env_file:
      - .env
    environment:
      DEBUG: "0"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
      - "${POST_SERVICE_PORT}:${POST_SERVICE_PORT}"
    depends_on:
      - postgres
    restart: always

  comment_service:
    build:
      context: .
      dockerfile: builds/comment_service/Dockerfile
    env_file:
      - .env
    environment:
      DEBUG: "0"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
      - "${COMMENT_SERVICE_PORT}:${COMMENT_SERVICE_PORT}"
    depends_on:
      - postgres
    restart: always

volumes:
  pg_data: