worker_processes auto;

events {
    worker_connections 10240;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream connection_backend {
        least_conn;

        server connection_service_1:8083 max_fails=3 fail_timeout=10s;
        server connection_service_2:8084 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 80;

        root /usr/share/nginx/html;
        index index.html;
        
        location = /index.html {
            add_header Cache-Control "no-store";
        }
        
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/sse/ {
            proxy_pass http://connection_backend;

            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;

            proxy_read_timeout 24h;
            proxy_send_timeout 24h;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/posts {
            proxy_pass http://post_service:8081;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/comments {
            proxy_pass http://comment_service:8082;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}